<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GardenOS 服务商端</title>
  <link rel="stylesheet" href="/mowing-platform/css/portal-theme.css" />
  <style>
    #providerLogoutBtn { margin-left: auto; }
    .provider-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .provider-order { border: 1px solid var(--portal-line, #E6E2DA); border-radius: 8px; padding: 14px; margin-top: 12px; background: rgba(255,255,255,0.72); }
    .provider-order header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .provider-order h3 { margin: 0; font-size: 18px; }
    .provider-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px 14px; font-size: 13px; margin: 10px 0; }
    .provider-meta span { color: var(--portal-muted, #6E7568); display: block; }
    .provider-note { width: 100%; min-height: 66px; box-sizing: border-box; border: 1px solid var(--portal-line, #E6E2DA); border-radius: 8px; padding: 10px; font: inherit; }
    .provider-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .provider-empty { padding: 18px; text-align: center; color: var(--portal-muted, #6E7568); }
  </style>
</head>
<body class="provider-portal">
  <div class="page">
    <div class="hero">
      <div>
        <div class="pill">服务商入口</div>
        <h1>GardenOS 服务商端</h1>
        <p>这里将承接服务商接单、到场确认、服务日志和异常反馈。当前先把身份分流和角色入口搭起来，后续再补完整工作台。</p>
      </div>
      <button class="btn btn-secondary hidden" id="providerLogoutBtn">退出</button>
    </div>

    <div class="card" id="providerAuthCard">
      <h2>登录后进入服务商端</h2>
      <p>服务商账号可以停留在这里；管理员可从后台进入各端查看，普通用户会自动回到客户端入口。</p>
      <div id="providerClerkAuth"></div>
      <div id="providerLoginStatus" style="text-align:center;margin-top:10px;font-size:13px;"></div>
    </div>

    <div class="hidden" id="providerApp">
      <div class="auth-grid">
        <div class="card">
          <h2>当前账号</h2>
          <p id="providerIdentity">正在读取服务商信息...</p>
        </div>
        <div class="card">
          <h2>当前阶段</h2>
          <p>服务商可在这里处理已分配订单、记录现场进度、上报异常并提交完工审核。</p>
        </div>
      </div>

      <div class="card">
        <div class="provider-toolbar">
          <h2 style="margin-right:auto;">我的工作台</h2>
          <button class="btn btn-secondary" type="button" id="providerRefreshBtn">刷新</button>
        </div>
        <div class="summary-grid" id="providerSummary">
          <div class="summary-card"><span>待接订单</span><strong>0</strong></div>
          <div class="summary-card"><span>服务中</span><strong>0</strong></div>
          <div class="summary-card"><span>待审核</span><strong>0</strong></div>
        </div>
        <div id="providerOrders" class="provider-empty">正在读取订单...</div>
      </div>
    </div>
  </div>

  <script src="/mowing-platform/js/clerk-auth.js?v=20260618-signin-flow-fix"></script>
  <script>
    const providerAuthCard = document.getElementById("providerAuthCard");
    const providerApp = document.getElementById("providerApp");
    const providerIdentity = document.getElementById("providerIdentity");
    const providerLogoutBtn = document.getElementById("providerLogoutBtn");
    const providerRefreshBtn = document.getElementById("providerRefreshBtn");
    const providerOrders = document.getElementById("providerOrders");
    const providerSummary = document.getElementById("providerSummary");
    let providerEmail = "";

    const statusLabels = {
      assigned: "待接单",
      accepted_by_worker: "已接单",
      in_service: "服务中",
      pending_quality_review: "待平台审核",
      completed: "已完成",
      exception_open: "异常处理中",
      quoted: "待重新派单",
    };

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    async function providerRequest(url, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (window.GardenOSAuth?.authHeaders) {
        Object.assign(headers, await window.GardenOSAuth.authHeaders());
      }
      const resp = await fetch(url, {
        ...options,
        headers,
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "操作失败");
      return data;
    }

    function renderSummary(orders) {
      const count = (status) => orders.filter((order) => order.status === status).length;
      providerSummary.innerHTML = `
        <div class="summary-card"><span>待接订单</span><strong>${count("assigned")}</strong></div>
        <div class="summary-card"><span>服务中</span><strong>${count("in_service") + count("accepted_by_worker")}</strong></div>
        <div class="summary-card"><span>待审核</span><strong>${count("pending_quality_review")}</strong></div>
      `;
    }

    function renderOrders(orders) {
      renderSummary(orders);
      if (!orders.length) {
        providerOrders.className = "provider-empty";
        providerOrders.innerHTML = "当前没有分配给你的活跃订单。";
        return;
      }
      providerOrders.className = "";
      providerOrders.innerHTML = orders.map((order) => `
        <article class="provider-order">
          <header>
            <div>
              <h3>${escapeHtml(order.id)} · ${escapeHtml(order.user)}</h3>
              <p>${escapeHtml(order.address)}</p>
            </div>
            <strong>${statusLabels[order.status] || escapeHtml(order.status)}</strong>
          </header>
          <div class="provider-meta">
            <div><span>服务类型</span>${escapeHtml(order.serviceType)}</div>
            <div><span>预约时间</span>${escapeHtml(order.requestedTime)}</div>
            <div><span>报价</span>${order.price ? `$${escapeHtml(order.price)}` : "待确认"}</div>
            <div><span>草坪情况</span>${escapeHtml(order.condition)}</div>
          </div>
          <textarea class="provider-note" id="providerNote-${order.id}" placeholder="现场说明、到场备注、完工说明或异常描述"></textarea>
          <input id="providerPhotos-${order.id}" type="file" accept="image/*" multiple style="margin-top:8px;width:100%;" />
          <div class="provider-meta">
            <div><span>证据照片</span>${(order.photos || []).length} 张</div>
          </div>
          <div class="provider-actions">
            ${order.status === "assigned" ? `<button class="btn btn-primary" data-provider-action="accept" data-order-id="${order.id}">接单</button>` : ""}
            ${["assigned", "accepted_by_worker"].includes(order.status) ? `<button class="btn btn-secondary" data-provider-action="reject" data-order-id="${order.id}">拒单</button>` : ""}
            ${["assigned", "accepted_by_worker"].includes(order.status) ? `<button class="btn btn-primary" data-provider-action="arrival" data-order-id="${order.id}">到场开工</button>` : ""}
            ${order.status === "in_service" ? `<button class="btn btn-secondary" data-provider-action="log" data-order-id="${order.id}">记录服务</button>` : ""}
            ${["accepted_by_worker", "in_service", "pending_quality_review"].includes(order.status) ? `<button class="btn btn-secondary" data-provider-action="evidence" data-order-id="${order.id}">上传照片</button>` : ""}
            ${order.status === "in_service" ? `<button class="btn btn-primary" data-provider-action="complete" data-order-id="${order.id}">提交完工</button>` : ""}
            ${!["completed", "pending_quality_review"].includes(order.status) ? `<button class="btn btn-secondary" data-provider-action="exception" data-order-id="${order.id}">上报异常</button>` : ""}
          </div>
        </article>
      `).join("");
    }

    async function loadProviderWorkbench() {
      if (!providerEmail) return;
      providerOrders.innerHTML = "正在读取订单...";
      const data = await providerRequest(`/api/provider/workbench?email=${encodeURIComponent(providerEmail)}`);
      const label = data.worker ? `${data.worker.name} · ${data.worker.email}` : `${data.user.displayName || data.user.email} · 管理员查看`;
      providerIdentity.textContent = label;
      renderOrders(data.orders || []);
    }

    async function runProviderAction(action, orderId) {
      const note = document.getElementById(`providerNote-${orderId}`)?.value.trim() || "";
      if (action === "evidence") {
        const input = document.getElementById(`providerPhotos-${orderId}`);
        if (!input?.files?.length) {
          alert("请先选择现场照片。");
          return;
        }
        const form = new FormData();
        form.append("email", providerEmail);
        form.append("note", note);
        Array.from(input.files).forEach((file) => form.append("photos", file));
        const headers = window.GardenOSAuth?.authHeaders
          ? await window.GardenOSAuth.authHeaders()
          : {};
        const resp = await fetch(`/api/provider/orders/${orderId}/evidence`, {
          method: "POST",
          headers,
          body: form,
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "上传失败");
        await loadProviderWorkbench();
        return;
      }
      const body = { email: providerEmail, note };
      let url = `/api/provider/orders/${orderId}/${action}`;
      if (action === "log") {
        url = `/api/provider/orders/${orderId}/service-log`;
        body.stage = "service_note";
      }
      if (action === "exception") {
        body.issueType = "现场异常";
      }
      await providerRequest(url, { method: "POST", body: JSON.stringify(body) });
      await loadProviderWorkbench();
    }

    providerOrders.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-provider-action]");
      if (!button) return;
      button.disabled = true;
      try {
        await runProviderAction(button.dataset.providerAction, button.dataset.orderId);
      } catch (error) {
        alert(error.message);
      } finally {
        button.disabled = false;
      }
    });

    providerRefreshBtn.addEventListener("click", () => {
      loadProviderWorkbench().catch((error) => alert(error.message));
    });

    window.addEventListener("load", async () => {
      try {
        await window.GardenOSAuth.guardPage({
          requiredRole: "server",
          mountTargetId: "providerClerkAuth",
          loginStatusId: "providerLoginStatus",
          onUnauthorized() {
            providerAuthCard.classList.remove("hidden");
            providerApp.classList.add("hidden");
            providerLogoutBtn.classList.add("hidden");
          },
          onAuthorized({ sessionUser }) {
            providerAuthCard.classList.add("hidden");
            providerApp.classList.remove("hidden");
            providerLogoutBtn.classList.remove("hidden");
            providerEmail = sessionUser.email;
            providerIdentity.textContent = `${sessionUser.displayName || sessionUser.email} · ${sessionUser.email}`;
            loadProviderWorkbench().catch((error) => {
              providerOrders.innerHTML = `读取失败：${escapeHtml(error.message)}`;
            });
          },
        });
      } catch (error) {
        document.getElementById("providerLoginStatus").innerHTML = `❌ 初始化失败：${error.message}`;
      }
    });

    providerLogoutBtn.addEventListener("click", async () => {
      await window.GardenOSAuth.signOut();
    });
  </script>
</body>
</html>
